steps:
  # Step 1: Docker build with Firebase config as build-args (substitution variables)
  - name: "gcr.io/cloud-builders/docker"
    id: "build"
    args:
      - "build"
      - "--build-arg=NEXT_PUBLIC_FIREBASE_API_KEY=${_FIREBASE_API_KEY}"
      - "--build-arg=NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${_FIREBASE_AUTH_DOMAIN}"
      - "--build-arg=NEXT_PUBLIC_FIREBASE_PROJECT_ID=${_FIREBASE_PROJECT_ID}"
      - "--build-arg=NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${_FIREBASE_STORAGE_BUCKET}"
      - "--build-arg=NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${_FIREBASE_MESSAGING_SENDER_ID}"
      - "--build-arg=NEXT_PUBLIC_FIREBASE_APP_ID=${_FIREBASE_APP_ID}"
      - "-t=asia-northeast1-docker.pkg.dev/nazonator/nazonator/app:$COMMIT_SHA"
      - "-t=asia-northeast1-docker.pkg.dev/nazonator/nazonator/app:latest"
      - "."

  # Step 2: Push image to Artifact Registry
  - name: "gcr.io/cloud-builders/docker"
    id: "push"
    waitFor: ["build"]
    args:
      - "push"
      - "--all-tags"
      - "asia-northeast1-docker.pkg.dev/nazonator/nazonator/app"

  # Step 3: Deploy to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "deploy"
    waitFor: ["push"]
    entrypoint: "gcloud"
    args:
      - "run"
      - "deploy"
      - "nazonator"
      - "--image=asia-northeast1-docker.pkg.dev/nazonator/nazonator/app:$COMMIT_SHA"
      - "--region=asia-northeast1"
      - "--memory=512Mi"
      - "--cpu=1"
      - "--min-instances=0"
      - "--max-instances=10"
      - "--allow-unauthenticated"
      - "--update-secrets=PINECONE_API_KEY=pinecone-api-key:latest"
      - "--update-env-vars=PINECONE_INDEX_NAME=${_PINECONE_INDEX_NAME}"
      - "--service-account=nazonator-run@nazonator.iam.gserviceaccount.com"

substitutions:
  _FIREBASE_API_KEY: ""
  _FIREBASE_AUTH_DOMAIN: ""
  _FIREBASE_PROJECT_ID: ""
  _FIREBASE_STORAGE_BUCKET: ""
  _FIREBASE_MESSAGING_SENDER_ID: ""
  _FIREBASE_APP_ID: ""
  _PINECONE_INDEX_NAME: ""

options:
  logging: CLOUD_LOGGING_ONLY
  substitutionOption: ALLOW_LOOSE
